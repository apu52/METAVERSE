<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rate Us</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        body {
            background-color: #1a1a2e;
            color: white;
        }
        .container {
            margin-top: 100px;
            text-align: center;
        }
        .emoji {
            font-size: 2rem;
            cursor: pointer;
            margin: 0 10px;
            transition: transform 0.2s, text-shadow 0.2s;
        }
        .emoji:hover {
            transform: scale(1.5);
            text-shadow: 0 0 5px rgba(255, 255, 255, 0.5);
        }
        .submit-button {
            margin-top: 20px;
            padding: 10px 20px;
            font-size: 1rem;
            border: none;
            background-color: #ff9bbd;
            color: white;
            cursor: pointer;
            transition: background-color 0.3s;
            border-radius: 5px;
        }
        .submit-button:hover {
            background-color: #ff61a6;
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-light bg-light fixed-top">
        <a class="navbar-brand" href="#">METAVERSE</a>
        <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ml-auto">
                <li class="nav-item">
                    <a class="nav-link" href="index.html">Home</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="about.html">About</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="contact.html">Contact</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="contributor.html">Contributors</a>
                </li>
            </ul>
        </div>
    </nav>

    <div class="container">
        <h1>Rate Us</h1>
        <div class="emojis">
            <span class="emoji" role="img" aria-label="cry">&#128546;</span>
            <span class="emoji" role="img" aria-label="neutral">&#128528;</span>
            <span class="emoji" role="img" aria-label="smile">&#128522;</span>
            <span class="emoji" role="img" aria-label="laugh">&#128514;</span>
            <span class="emoji" role="img" aria-label="super">&#128526;</span>
        </div>
        <div class="textarea-container">
            <textarea placeholder="Leave your feedback here..." class="form-control" rows="3"></textarea>
        </div>
        <button class="submit-button">Submit</button>
    </div>

    <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.9.2/dist/umd/popper.min.js"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
</body>
</html>
